services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  order-engine:
    build:
      context: .
      dockerfile: order-engine/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: order_user
      SPRING_DATASOURCE_PASSWORD: order_pass
      INTEGRATIONS_PAYMENT_SERVICE_URL: http://payment-service:8081
      GRPC_CLIENT_STOCK_SERVICE_ADDRESS: static://stock-service:9090
    depends_on:
      - postgres

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      INTEGRATIONS_ORDER_ENGINE_URL: http://order-engine:8080

  stock-service:
    build:
      context: .
      dockerfile: stock-service/Dockerfile
    ports:
      - "8082:8082"
      - "9090:9090"
    environment:
      INTEGRATIONS_ORDER_ENGINE_URL: http://order-engine:8080

  order-ui:
    build: ./order-ui
    ports:
      - "3000:80"
    depends_on:
      - order-engine

volumes:
  postgres_data:
