server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to order-engine, stripping the /api prefix.
    # Handles both REST (HTTP/1.1) and WebSocket (STOMP over SockJS) traffic.
    location /api/ {
        proxy_pass http://order-engine:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
